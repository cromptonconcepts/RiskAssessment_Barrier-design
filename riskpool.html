<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Risk & Mitigation Master Pool</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .risk-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-left-width: 6px; }
        .risk-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .category-SPA { border-left-color: #8b5cf6; } 
        .category-BDR { border-left-color: #f97316; } 
        .category-TMG { border-left-color: #10b981; } 
        .category-ETT { border-left-color: #0ea5e9; } 
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .badge-count { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-lg border-b border-slate-200">
        <div class="max-w-[1600px] mx-auto px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="bg-slate-900 text-white p-3 rounded-2xl shadow-lg">
                    <i class="fas fa-layer-group text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight text-slate-900">Comprehensive Risk Pool</h1>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Deep Analysis Database</p>
                </div>
            </div>

            <div class="flex-1 max-w-2xl mx-12 hidden lg:block">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="master-search" placeholder="Search detailed hazards, mechanisms, or mitigations..." class="w-full bg-slate-100 border-none rounded-xl py-3 pl-12 pr-4 focus:ring-2 focus:ring-slate-900 text-sm transition-all">
                </div>
            </div>

            <div class="flex items-center gap-4">
                <button id="cart-toggle" class="relative bg-slate-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 transition flex items-center gap-3">
                    <i class="fas fa-clipboard-check"></i>
                    <span>Selection Pool</span>
                    <span id="cart-count" class="bg-blue-500 text-white text-[10px] w-6 h-6 flex items-center justify-center rounded-full badge-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-[1600px] mx-auto px-6 py-8 flex flex-col lg:flex-row gap-8">
        
        <aside class="w-full lg:w-72 flex flex-col gap-6">
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Risk Categories</h3>
                <nav class="flex flex-col gap-2" id="category-nav">
                    <button data-cat="all" class="cat-btn w-full flex items-center justify-between px-4 py-3 rounded-xl bg-slate-900 text-white font-bold text-sm transition shadow-lg">
                        <span>All Risks</span>
                        <span class="text-[10px] opacity-60" id="count-all">0</span>
                    </button>
                    <button data-cat="SPA" class="cat-btn w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-slate-100 text-slate-600 font-bold text-sm transition">
                        <div class="flex items-center gap-3"><i class="fas fa-truck-moving text-purple-500"></i><span>Swept Path</span></div>
                    </button>
                    <button data-cat="BDR" class="cat-btn w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-slate-100 text-slate-600 font-bold text-sm transition">
                        <div class="flex items-center gap-3"><i class="fas fa-road-barrier text-orange-500"></i><span>Barrier Design</span></div>
                    </button>
                    <button data-cat="TMG" class="cat-btn w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-slate-100 text-slate-600 font-bold text-sm transition">
                        <div class="flex items-center gap-3"><i class="fas fa-traffic-light text-emerald-500"></i><span>Traffic Guidance</span></div>
                    </button>
                    <button data-cat="ETT" class="cat-btn w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-slate-100 text-slate-600 font-bold text-sm transition">
                        <div class="flex items-center gap-3"><i class="fas fa-compass text-blue-500"></i><span>TTM Engineering</span></div>
                    </button>
                </nav>
            </div>
        </aside>

        <section class="flex-1">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight" id="active-cat-title">Master Engineering Pool</h2>
                    <p class="text-slate-500 text-sm font-medium mt-1" id="results-meta">Displaying all indexed hazards</p>
                </div>
                <button id="multi-add" class="text-xs font-bold text-blue-600 hover:text-blue-800 transition">Add All Visible to Pool</button>
            </div>

            <div id="risk-grid" class="grid grid-cols-1 xl:grid-cols-2 gap-6">
                </div>

            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-32 text-center">
                <div class="bg-slate-200 w-24 h-24 rounded-full flex items-center justify-center mb-6">
                    <i class="fas fa-search-minus text-3xl text-slate-400"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-800">No matching hazards found</h3>
            </div>
        </section>
    </main>

    <div id="drawer-backdrop" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[60] opacity-0 pointer-events-none transition-opacity duration-300"></div>
    <div id="drawer" class="fixed top-0 right-0 h-full w-full max-w-xl bg-white z-[70] translate-x-full transition-transform duration-500 shadow-2xl flex flex-col">
        <div class="p-8 border-b border-slate-100 flex justify-between items-center">
            <div>
                <h2 class="text-2xl font-black text-slate-900">Selection Pool</h2>
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mt-1">Staged Risks for Export</p>
            </div>
            <button id="drawer-close" class="bg-slate-100 p-3 rounded-xl text-slate-500 hover:bg-slate-200 transition">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>

        <div id="cart-items" class="flex-1 overflow-y-auto p-8 space-y-4 custom-scrollbar"></div>

        <div class="p-8 bg-slate-50 border-t border-slate-200">
            <div class="flex flex-col gap-3">
                <button id="export-text" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-lg hover:bg-slate-800 shadow-xl transition flex items-center justify-center gap-3">
                    <i class="fas fa-copy"></i>
                    <span>Copy Full Register Text</span>
                </button>
                <button id="clear-all" class="w-full py-2 mt-2 text-sm font-bold text-slate-400 hover:text-red-500 transition">
                    Clear Selection Pool
                </button>
            </div>
        </div>
    </div>

    <div id="details-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[80] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl max-w-4xl w-full max-h-[95vh] overflow-y-auto shadow-2xl transform transition-all p-8 md:p-10 relative custom-scrollbar">
            <button onclick="closeDetails()" class="absolute top-6 right-6 bg-slate-100 p-2 rounded-xl text-slate-500 hover:bg-slate-200 transition">
                <i class="fas fa-times text-xl"></i>
            </button>
            <div id="details-content"></div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[100] bg-slate-900 text-white px-8 py-4 rounded-2xl shadow-2xl opacity-0 translate-y-10 transition-all duration-300 flex items-center gap-4">
        <i class="fas fa-check-circle text-emerald-400 text-lg"></i>
        <span id="toast-msg" class="font-bold text-sm tracking-tight">Notification</span>
    </div>

    <script>
        // --- DEEP ANALYSIS DATA SEEDING WITH FULL RISK REGISTER FIELDS ---
        const riskPool = [
            {
                id: "SPA-001", catID: "SPA", category: "Swept Path Analysis",
                hazard: "Opposing Lane Encroachment on Intersection Entry",
                mechanism: "Design vehicle's rear axles track inside the turn radius, forcing the cab or trailer into opposing lanes of traffic. Exacerbated by acute intersection angles and restricted road widths.",
                impact: "Head-on collision with opposing traffic, traffic network gridlock, damage to third-party vehicles, and potential for severe injury.",
                initialLikelihood: "Likely (4)",
                initialConsequence: "Major (4)",
                initialRisk: "High (16)",
                mitigations: [
                    "Widen the intersection bell-mouth to accommodate the full swept path envelope without crossing the centerline.",
                    "Recess the holding line (stop bar) for opposing traffic by 5-10 meters to provide clearance for turning heavy vehicles.",
                    "Implement a localized road widening or median island modification to increase the physical turning radius.",
                    "Install 'No Left/Right Turn for Heavy Vehicles' regulatory signage if an alternative suitable route exists.",
                    "Utilize mountable kerbs and hardened aprons on the inside radius to allow safe over-tracking."
                ],
                residualLikelihood: "Unlikely (2)",
                residualConsequence: "Moderate (3)",
                residualRisk: "Medium (6)",
                riskOwner: "Traffic Engineer / Principal Contractor",
                action: "Incorporate geometric changes into Issued For Construction (IFC) drawings and update Traffic Management Plan (TMP).",
                reference: "Austroads Guide to Road Design Part 4: Intersections and Crossings"
            },
            {
                id: "SPA-002", catID: "SPA", category: "Swept Path Analysis",
                hazard: "Tail-Swing Pedestrian Zone Strike",
                mechanism: "The rear overhang of heavy vehicles (especially buses and semi-trailers) sweeps over footpaths or pedestrian refuges during tight maneuvers.",
                impact: "Severe injury or fatality to pedestrians in the swing zone. Major structural damage to street furniture (poles, bins, fencing).",
                initialLikelihood: "Possible (3)",
                initialConsequence: "Catastrophic (5)",
                initialRisk: "High (15)",
                mitigations: [
                    "Increase the corner radius to reduce the severity of the turn angle and subsequent tail-swing arc.",
                    "Relocate pedestrian crossings, waiting zones, or bus stops outside the calculated tail-swing envelope.",
                    "Install physical barriers (e.g., pedestrian fencing or bollards) to prevent pedestrians from standing in the swing zone."
                ],
                residualLikelihood: "Rare (1)",
                residualConsequence: "Major (4)",
                residualRisk: "Low (4)",
                riskOwner: "Project Manager",
                action: "Review pedestrian desire lines and install physical containment barriers prior to site establishment.",
                reference: "AS 2890.2: Off-street commercial vehicle facilities"
            },
            {
                id: "BDR-001", catID: "BDR", category: "Road Safety Barrier Design",
                hazard: "Dynamic Deflection into Active Workzone",
                mechanism: "Vehicle impact on a temporary barrier system causes the barrier to deflect dynamically into the protected work area.",
                impact: "Striking workers, plant, or dropping into an excavation, leading to severe injury, fatality, or major project delays.",
                initialLikelihood: "Possible (3)",
                initialConsequence: "Catastrophic (5)",
                initialRisk: "Extreme (15)",
                mitigations: [
                    "Ensure the lateral clearance between the barrier and the work zone/excavation exceeds the tested dynamic deflection of the chosen system.",
                    "Upgrade to a stiffer barrier system (e.g., from water-filled plastic to steel, or from free-standing concrete to pinned concrete).",
                    "Implement speed limit reductions on the approach and adjacent to the barrier to lower impact energy.",
                    "Schedule works located within the deflection zone during off-peak periods under full lane or road closures."
                ],
                residualLikelihood: "Unlikely (2)",
                residualConsequence: "Major (4)",
                residualRisk: "Medium (8)",
                riskOwner: "Safety Manager / Traffic Engineer",
                action: "Verify barrier deflection specs against site constraints and adjust working footprint.",
                reference: "AS/NZS 3845.1: Road safety barrier systems"
            },
            {
                id: "TMG-001", catID: "TMG", category: "Traffic Management (Guidance)",
                hazard: "End-of-Queue Rear-End Collision",
                mechanism: "Traffic queuing from a lane closure or stop-go operation extends beyond the advanced warning signage.",
                impact: "High-speed rear-end collision, multi-vehicle pileup, severe injuries to road users and localized traffic gridlock.",
                initialLikelihood: "Likely (4)",
                initialConsequence: "Major (4)",
                initialRisk: "High (16)",
                mitigations: [
                    "Deploy active Variable Message Signs (VMS) well upstream of the maximum calculated queue length.",
                    "Utilize a shadow vehicle with a Truck Mounted Attenuator (TMA) stationed at the rear of the queue, moving backward as the queue extends.",
                    "Calculate queue lengths using shock wave theory and position advanced warning signs accordingly."
                ],
                residualLikelihood: "Unlikely (2)",
                residualConsequence: "Moderate (3)",
                residualRisk: "Medium (6)",
                riskOwner: "Traffic Control Supervisor",
                action: "Brief traffic controllers on queue monitoring and TMA repositioning triggers.",
                reference: "MUTCD Part 3 / Austroads Guide to Temporary Traffic Management"
            }
        ];

        let selectionPool = [];
        let activeFilter = 'all';

        const grid = document.getElementById('risk-grid');
        const cartItems = document.getElementById('cart-items');
        const cartCount = document.getElementById('cart-count');
        const masterSearch = document.getElementById('master-search');

        function renderGrid() {
            const query = masterSearch.value.toLowerCase();
            const filtered = riskPool.filter(r => {
                const matchesCat = activeFilter === 'all' || r.catID === activeFilter;
                const searchString = `${r.hazard} ${r.mechanism} ${r.mitigations.join(' ')}`.toLowerCase();
                return matchesCat && searchString.includes(query);
            });

            grid.innerHTML = '';
            document.getElementById('empty-state').classList.toggle('hidden', filtered.length > 0);
            document.getElementById('results-meta').innerText = `Displaying ${filtered.length} high-fidelity hazards`;

            filtered.forEach(r => {
                const isSelected = selectionPool.some(s => s.id === r.id);
                const card = document.createElement('div');
                card.className = `risk-card flex flex-col justify-between bg-white p-6 rounded-3xl border border-slate-200 shadow-sm cursor-pointer category-${r.catID} ${isSelected ? 'ring-4 ring-slate-900/5 bg-slate-50' : ''}`;
                card.onclick = () => toggleSelection(r.id);

                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] font-black uppercase tracking-widest text-slate-400 bg-slate-100 px-2 py-1 rounded">${r.id}</span>
                            <div class="w-8 h-8 rounded-full border-2 flex items-center justify-center transition-all ${isSelected ? 'bg-slate-900 border-slate-900 text-white' : 'border-slate-200 text-transparent'}">
                                <i class="fas fa-check text-xs"></i>
                            </div>
                        </div>
                        <p class="text-[10px] font-bold text-slate-400 mb-1 uppercase tracking-tight">${r.category}</p>
                        <h3 class="font-bold text-slate-900 leading-tight text-lg mb-3">${r.hazard}</h3>
                        <p class="text-xs text-slate-500 line-clamp-2 mb-4 italic">${r.impact}</p>
                        
                        <div class="flex gap-4 mt-4">
                            <div class="flex-1 bg-red-50 p-3 rounded-xl border border-red-100">
                                <p class="text-[9px] font-black text-red-500 uppercase mb-1">Initial Risk</p>
                                <p class="text-sm font-bold text-red-700">${r.initialRisk}</p>
                            </div>
                            <div class="flex-1 bg-green-50 p-3 rounded-xl border border-green-100">
                                <p class="text-[9px] font-black text-green-600 uppercase mb-1">Residual Risk</p>
                                <p class="text-sm font-bold text-green-700">${r.residualRisk}</p>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-slate-100 flex items-center justify-between">
                        <span class="text-xs font-bold text-slate-500"><i class="fas fa-shield-alt mr-1"></i> ${r.mitigations.length} Controls</span>
                        <button onclick="showDetails('${r.id}', event)" class="text-xs font-bold text-blue-600 hover:text-blue-800 transition bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-xl flex items-center gap-2">
                            <i class="fas fa-expand-arrows-alt"></i> Full Profile
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function toggleSelection(id) {
            const risk = riskPool.find(r => r.id === id);
            const idx = selectionPool.findIndex(s => s.id === id);
            
            if (idx > -1) {
                selectionPool.splice(idx, 1);
            } else {
                selectionPool.push(risk);
                showToast(`Added: ${risk.hazard.substring(0, 20)}...`);
            }
            updatePoolUI();
            renderGrid();
        }

        function updatePoolUI() {
            cartCount.innerText = selectionPool.length;
            cartItems.innerHTML = '';
            if (selectionPool.length === 0) return;

            selectionPool.forEach(s => {
                const item = document.createElement('div');
                item.className = "bg-white p-5 rounded-2xl border border-slate-200 flex justify-between items-start gap-4 shadow-sm";
                item.innerHTML = `
                    <div class="flex-1">
                        <p class="text-[9px] font-black text-slate-400 uppercase">${s.id}</p>
                        <h4 class="font-bold text-slate-900 text-sm mt-1">${s.hazard}</h4>
                    </div>
                    <button onclick="toggleSelection('${s.id}')" class="text-slate-300 hover:text-red-500 transition mt-1">
                        <i class="fas fa-times-circle text-lg"></i>
                    </button>
                `;
                cartItems.appendChild(item);
            });
        }

        function showDetails(id, event) {
            if(event) event.stopPropagation();
            const r = riskPool.find(x => x.id === id);
            if(!r) return;
            
            let badgeColor = r.catID === 'SPA' ? 'bg-purple-500' : r.catID === 'BDR' ? 'bg-orange-500' : r.catID === 'TMG' ? 'bg-emerald-500' : 'bg-blue-500';

            const mitigationsHTML = r.mitigations.map((m, index) => 
                `<li class="flex gap-3 text-slate-700 text-sm leading-relaxed pb-3 border-b border-indigo-100 last:border-0 last:pb-0">
                    <span class="font-black text-indigo-400 select-none">${index + 1}.</span>
                    <span>${m}</span>
                </li>`
            ).join('');

            const content = document.getElementById('details-content');
            content.innerHTML = `
                <div class="mb-4">
                    <span class="text-[10px] font-black uppercase tracking-widest text-white ${badgeColor} px-3 py-1.5 rounded-lg shadow-sm">${r.id} | ${r.category}</span>
                </div>
                <h2 class="text-3xl font-black text-slate-900 mb-6 leading-tight">${r.hazard}</h2>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2"><i class="fas fa-bolt mr-2 text-slate-400"></i>Failure Mechanism</h4>
                        <p class="text-slate-700 text-sm leading-relaxed">${r.mechanism}</p>
                    </div>
                    <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100">
                        <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2"><i class="fas fa-exclamation-triangle mr-2 text-slate-400"></i>Impact & Consequence</h4>
                        <p class="text-slate-700 text-sm leading-relaxed">${r.impact}</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div class="bg-red-50/50 p-5 rounded-2xl border border-red-100">
                        <h4 class="text-[10px] font-black text-red-500 uppercase tracking-widest mb-4">Initial Risk Rating</h4>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between"><span class="text-slate-600">Likelihood:</span> <span class="font-bold text-slate-800">${r.initialLikelihood}</span></div>
                            <div class="flex justify-between"><span class="text-slate-600">Consequence:</span> <span class="font-bold text-slate-800">${r.initialConsequence}</span></div>
                            <div class="flex justify-between pt-2 border-t border-red-100"><span class="text-slate-600 font-bold">Initial Risk:</span> <span class="font-black text-red-600">${r.initialRisk}</span></div>
                        </div>
                    </div>

                    <div class="bg-green-50/50 p-5 rounded-2xl border border-green-100">
                        <h4 class="text-[10px] font-black text-green-600 uppercase tracking-widest mb-4">Residual Risk Rating</h4>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between"><span class="text-slate-600">Likelihood:</span> <span class="font-bold text-slate-800">${r.residualLikelihood}</span></div>
                            <div class="flex justify-between"><span class="text-slate-600">Consequence:</span> <span class="font-bold text-slate-800">${r.residualConsequence}</span></div>
                            <div class="flex justify-between pt-2 border-t border-green-100"><span class="text-slate-600 font-bold">Residual Risk:</span> <span class="font-black text-green-600">${r.residualRisk}</span></div>
                        </div>
                    </div>
                </div>
                
                <div class="bg-indigo-50/50 p-6 rounded-2xl border border-indigo-100 mb-6">
                    <h4 class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-4"><i class="fas fa-shield-alt mr-2"></i>Comprehensive Risk Controls (Mitigations)</h4>
                    <ul class="space-y-3">
                        ${mitigationsHTML}
                    </ul>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100">
                        <h4 class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1"><i class="fas fa-user-hard-hat mr-2"></i>Risk Owner</h4>
                        <p class="text-slate-800 text-sm font-bold">${r.riskOwner}</p>
                    </div>
                    <div class="p-5 bg-slate-50 rounded-2xl border border-slate-100">
                        <h4 class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1"><i class="fas fa-tasks mr-2"></i>Action Required</h4>
                        <p class="text-slate-800 text-sm font-bold">${r.action}</p>
                    </div>
                </div>
                
                <div class="mt-8 pt-6 border-t border-slate-100 flex flex-col-reverse md:flex-row justify-end gap-3">
                    <button onclick="closeDetails()" class="px-6 py-3 rounded-xl font-bold text-slate-500 hover:bg-slate-100 transition text-center">Close Window</button>
                    <button onclick="toggleSelection('${r.id}'); closeDetails();" class="bg-slate-900 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-800 shadow-lg transition flex items-center justify-center gap-2">
                        ${selectionPool.some(s => s.id === r.id) ? '<i class="fas fa-minus"></i> Remove from Selection' : '<i class="fas fa-plus"></i> Add to Selection'}
                    </button>
                </div>
            `;
            document.getElementById('details-modal').classList.remove('hidden');
        }

        function closeDetails() {
            document.getElementById('details-modal').classList.add('hidden');
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.remove('opacity-0', 'translate-y-10');
            setTimeout(() => t.classList.add('opacity-0', 'translate-y-10'), 2500);
        }

        // --- HANDLERS ---
        masterSearch.addEventListener('input', renderGrid);
        
        document.querySelectorAll('.cat-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.cat-btn').forEach(b => {
                    b.className = "cat-btn w-full flex items-center justify-between px-4 py-3 rounded-xl hover:bg-slate-100 text-slate-600 font-bold text-sm transition";
                });
                btn.className = "cat-btn w-full flex items-center justify-between px-4 py-3 rounded-xl bg-slate-900 text-white font-bold text-sm transition shadow-lg";
                activeFilter = btn.getAttribute('data-cat');
                renderGrid();
                document.getElementById('active-cat-title').innerText = activeFilter === 'all' ? 'Master Engineering Pool' : btn.querySelector('span').innerText;
            });
        });

        document.getElementById('cart-toggle').onclick = () => {
            document.getElementById('drawer').classList.remove('translate-x-full');
            document.getElementById('drawer-backdrop').classList.remove('opacity-0', 'pointer-events-none');
        };

        document.getElementById('drawer-close').onclick = () => {
            document.getElementById('drawer').classList.add('translate-x-full');
            document.getElementById('drawer-backdrop').classList.add('opacity-0', 'pointer-events-none');
        };

        document.getElementById('drawer-backdrop').onclick = () => {
            document.getElementById('drawer-close').click();
            closeDetails();
        };

        document.getElementById('clear-all').onclick = () => {
            selectionPool = [];
            updatePoolUI();
            renderGrid();
        };

        // EXPORT TEXT WITH ALL REQUIRED REGISTER FIELDS
        document.getElementById('export-text').onclick = () => {
            if (selectionPool.length === 0) return;
            
            const text = selectionPool.map(s => {
                const mitigationsText = s.mitigations.map((m, i) => `  ${i + 1}. ${m}`).join('\n');
                return `Hazard / Risk: ${s.hazard}\nImpact / Consequence: ${s.impact}\nLikelihood (Initial): ${s.initialLikelihood}\nConsequence (Initial): ${s.initialConsequence}\nInitial Risk: ${s.initialRisk}\nRisk Controls:\n${mitigationsText}\nLikelihood (Residual): ${s.residualLikelihood}\nConsequence (Residual): ${s.residualConsequence}\nResidual Risk: ${s.residualRisk}\nRisk Owner: ${s.riskOwner}\nAction: ${s.action}\n-----------------------------------------`;
            }).join('\n\n');
            
            const el = document.createElement('textarea');
            el.value = text;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            
            showToast("Full Register Text Copied to Clipboard!");
            setTimeout(() => document.getElementById('drawer-close').click(), 1000);
        };

        document.getElementById('multi-add').onclick = () => {
            const query = masterSearch.value.toLowerCase();
            const filtered = riskPool.filter(r => {
                const matchesCat = activeFilter === 'all' || r.catID === activeFilter;
                const matchesSearch = `${r.hazard} ${r.mechanism} ${r.mitigations.join(' ')}`.toLowerCase().includes(query);
                return matchesCat && matchesSearch;
            });
            
            filtered.forEach(r => {
                if (!selectionPool.some(s => s.id === r.id)) selectionPool.push(r);
            });
            updatePoolUI();
            renderGrid();
            showToast(`Added ${filtered.length} hazards to pool`);
        };

        // Initialize
        renderGrid();
        document.getElementById('count-all').innerText = riskPool.length;
    </script>
</body>
</html>
